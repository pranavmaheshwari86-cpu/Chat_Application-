services:
  mongodb:
    image: mongo:7
    container_name: flashchat-mongo-prod
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    restart: always
    command: --wiredTigerCacheSizeGB 1.5

  redis:
    image: redis:7-alpine
    container_name: flashchat-redis-prod
    ports:
      - "6379:6379"
    restart: always
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data

  server:
    build: ./backend
    container_name: flashchat-server-prod
    ports:
      - "4000:4000"
    environment:
      - NODE_ENV=production
      - PORT=4000
      - MONGODB_URI=mongodb://mongodb:27017/flashchat
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - JWT_ACCESS_SECRET=${JWT_ACCESS_SECRET}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET}
      - JWT_ACCESS_EXPIRY=15m
      - JWT_REFRESH_EXPIRY=7d
      - CLIENT_URL=${CLIENT_URL}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - CLOUDINARY_CLOUD_NAME=${CLOUDINARY_CLOUD_NAME}
      - CLOUDINARY_API_KEY=${CLOUDINARY_API_KEY}
      - CLOUDINARY_API_SECRET=${CLOUDINARY_API_SECRET}
      - THROTTLE_TTL=60
      - THROTTLE_LIMIT=150
    depends_on:
      - mongodb
      - redis
    restart: always
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G

  client:
    build: ./frontend
    container_name: flashchat-client-prod
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=${API_URL}
      - NEXT_PUBLIC_SOCKET_URL=${SOCKET_URL}
      - NEXT_PUBLIC_GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - NEXT_PUBLIC_CLOUDINARY_CLOUD_NAME=${CLOUDINARY_CLOUD_NAME}
    depends_on:
      - server
    restart: always
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M

volumes:
  mongo-data:
  redis-data:
