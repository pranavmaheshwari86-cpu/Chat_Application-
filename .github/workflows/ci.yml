name: FlashChat CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test-server:
    name: Test & Build Server
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'package-lock.json'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Lint Backend
        run: npm --workspace=backend run lint --if-present
        
      - name: Build Shared
        run: npm run build:shared
        
      - name: Verify shared build
        run: test -d shared/dist || (echo "shared/dist missing" && exit 1)

      - name: Build Backend
        run: npm run build:backend

  test-client:
    name: Test & Build Client
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'package-lock.json'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Lint Frontend
        run: npm --workspace=frontend run lint --if-present
        
      - name: Build Shared
        run: npm run build:shared
        
      - name: Verify shared build
        run: test -d shared/dist || (echo "shared/dist missing" && exit 1)

      - name: Build Frontend
        run: npm run build:frontend
        env:
          NEXT_PUBLIC_API_URL: http://localhost:4000
          NEXT_PUBLIC_SOCKET_URL: http://localhost:4000

  docker-build:
    name: Docker Build Check
    needs: [test-server, test-client]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        
      - name: Build Server Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./backend/Dockerfile
          push: false
          tags: flashchat-server:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          
      - name: Build Client Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./frontend/Dockerfile
          push: false
          tags: flashchat-client:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
